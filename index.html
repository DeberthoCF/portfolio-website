<script>
const sections = document.querySelectorAll("section");
const navLinks = document.querySelectorAll(".nav-link");

window.addEventListener("scroll", () => {
    let current = "";

    sections.forEach(section => {
        const top = section.offsetTop - 120; // navbar offset
        const height = section.offsetHeight;

        if (scrollY >= top && scrollY < top + height) {
            current = section.getAttribute("id");
        }
    });

    navLinks.forEach(link => {
        link.classList.remove("active");
        if (link.getAttribute("href") === "#" + current) {
            link.classList.add("active");
        }
    });
});
</script>

<script>

const words = [
    "Génie informatique.",
    "Développement front-end.",
    
];








const typedText = document.getElementById("typed-text");
const cursor = document.getElementById("cursor");

let wordIndex = 0;
let charIndex = 0;
let isDeleting = false;

function typeLoop() {
    const currentWord = words[wordIndex];

    if (!isDeleting) {
        typedText.textContent = currentWord.substring(0, charIndex + 1);
        charIndex++;

        if (charIndex === currentWord.length) {
            setTimeout(() => isDeleting = true, 1300); // pause à la fin
        }
    } else {
        typedText.textContent = currentWord.substring(0, charIndex - 1);
        charIndex--;

        if (charIndex === 0) {
            isDeleting = false;
            wordIndex = (wordIndex + 1) % words.length;
        }
    }

    setTimeout(typeLoop, isDeleting ? 60 : 90);
}

typeLoop();
</script>

<script>
function startTypewriter(text, targetId, cursorId, speed = 150) {
    const target = document.getElementById(targetId);
    const cursor = document.getElementById(cursorId);

    if (!target || !cursor) return;

    target.textContent = "";
    let index = 0;

    function type() {
        if (index < text.length) {
            target.textContent += text.charAt(index);
            index++;
            setTimeout(type, speed);
        } else {
            cursor.style.animation = "none";
            cursor.style.opacity = "1";
        }
    }

    type();
}
</script>



































<script>
let contactAnimationPlayed = false;

function triggerContactAnimation() {
    if (contactAnimationPlayed) return;

    startTypewriter(
        "Merci de votre visite. À bientôt.",
        "text",
        "cursor",
        180
    );

    contactAnimationPlayed = true;
}

// 🎯 Déclenchement au SCROLL (quand Contact est visible)
const contactSection = document.getElementById("contact");

const contactObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            triggerContactAnimation();
        }
    });
}, {
    threshold: 0.5 // 50% visible
});

if (contactSection) {
    contactObserver.observe(contactSection);
}

// 🎯 Déclenchement au CLIC
document.querySelectorAll('a[href="#contact"]').forEach(link => {
    link.addEventListener("click", () => {
        setTimeout(triggerContactAnimation, 400);
    });
});
</script>
