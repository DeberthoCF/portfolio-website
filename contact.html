    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

<!-- NAVBAR -->
<header>
    <nav class="navbar">
        <div class="logo">Portfolio<span class="cyan">.</span></div>
        
        <ul class="nav-links">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./about.html">About</a></li>
            <li><a href="./skills.html">Skills</a></li>
            <li><a href="./projects.html">Projects</a></li>
            <li><a href="./contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>





<!-- SECTION CONTACT -->
<section class="contact-section" id="contact">
    

    <!-- PHRASE CINÉ -->
    <h3 class="cinema-text">
        <span id="text"></span><span id="cursor"></span>
    </h3>


    <!-- TEXTE PRO -->
    <p class="contact-intro">
        Ouvert aux collaborations et aux opportunités professionnelles.<br>
        Laissez un message.
    </p>

    <!-- FORMULAIRE -->
    <form class="contact-form"
          action="https://formspree.io/f/mbdjwpnp"
          method="POST">

        <input type="text"
               name="fullname"
               placeholder="Nom complet"
               required>

        <input type="email"
               name="email"
               placeholder="Adresse e-mail"
               required>

        <textarea name="message"
                  rows="5"
                  placeholder="Votre message"
                  required></textarea>

        <button type="submit">Envoyer</button>
    </form>

    <!-- ICÔNES CONTACT -->
    <div class="contact-icons">
        <a href="https://github.com/DeberthoCF" target="_blank">
            <i class="fab fa-github"></i>
        </a>

        

        <a href="https://www.linkedin.com/in/debertho-lentz-bellegarde-232b333a1/"
           target="_blank">
            <i class="fab fa-linkedin"></i>
        </a>
    </div>
</section>


<script>
const text = "Merci de votre visite. À bientôt.";
const target = document.getElementById("text");
const cursor = document.getElementById("cursor");
let index = 0;

function typeWriter() {
    if (index < text.length) {
        target.textContent += text.charAt(index);
        index++;
        setTimeout(typeWriter, 180); // Vitesse de frappe
    } else {
        // À la fin : on ARRÊTE le clignotement
        cursor.style.animation = "none";
        cursor.style.opacity = "1";
    }
}

window.addEventListener("load", typeWriter);
</script>



</body>
</html>
